description: 'FOCUS-aligned FinOps for Comfort Systems USA: project- and contract-priced mechanical/HVAC
  services. No public API or recurring SaaS spend; meters cover invoice-line abstractions for capital
  projects and recurring service contracts.'
sources:
  - https://www.comfortsystemsusa.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Comfort Systems USA, Inc.
serviceCategory: Construction Services
billingModel:
  pricingCategory: Project / Service Contract
  billingFrequency: Per-Invoice
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
    - Refund
focusColumns:
  ServiceName: Comfort Systems USA
  ServiceCategory: Construction Services
  ProviderName: Comfort Systems USA
  PublisherName: Comfort Systems USA, Inc.
  InvoiceIssuerName: Comfort Systems USA, Inc.
  BillingCurrency: USD
meters:
  - name: project_milestones
    unit: milestone
    aggregation: sum
    dimensions:
      - project
      - subsidiary
  - name: service_contract
    unit: month
    aggregation: sum
    dimensions:
      - site
      - scope
  - name: time_and_materials
    unit: hour
    aggregation: sum
    dimensions:
      - trade
      - region
principles:
  - name: Visibility
    description: Reconcile project invoices against the schedule of values and change orders; track service-contract
      utilization.
  - name: Allocation
    description: Tag invoices to building, site, or capital project for chargeback.
  - name: Optimization
    description: Bundle service work; renegotiate multi-site service contracts at renewal; compare bids
      across Comfort Systems subsidiaries.
  - name: Accountability
    description: Facilities/PMO owns project scope; finance owns capital approvals and AP.
notes: No public API/SaaS pricing.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
